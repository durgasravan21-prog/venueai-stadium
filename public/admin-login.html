<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VenueAI | Command Center Login</title>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-dark: #0a0a0a;
      --bg-panel: #111111;
      --amber: #c9973a;
      --amber-hover: #d3ab5d;
      --walnut: #2a221f;
      --text: #e0e0e0;
      --danger: #ef4444;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background-color: var(--bg-dark);
      color: var(--text);
      font-family: 'Nunito', sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }
    .login-container {
      background: var(--bg-panel);
      padding: 40px;
      border-radius: 16px;
      width: 100%;
      max-width: 400px;
      box-shadow: 0 10px 40px rgba(0,0,0,0.5);
      border: 1px solid rgba(201,151,58,0.2);
    }
    .logo {
      font-family: 'Courier New', Courier, monospace;
      font-size: 2rem;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: -1px;
      text-align: center;
      margin-bottom: 30px;
    }
    .logo span {
      background: linear-gradient(135deg, #c9973a, #fcefa6);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .form-group { margin-bottom: 20px; }
    label {
      display: block;
      margin-bottom: 8px;
      font-size: 0.85rem;
      color: rgba(255,255,255,0.6);
      text-transform: uppercase;
      letter-spacing: 1px;
    }
    input {
      width: 100%;
      padding: 12px 16px;
      background: rgba(0,0,0,0.3);
      border: 1px solid #333;
      border-radius: 8px;
      color: #fff;
      font-family: inherit;
      font-size: 1rem;
      outline: none;
      transition: all 0.2s;
    }
    input:focus {
      border-color: var(--amber);
      box-shadow: 0 0 0 2px rgba(201,151,58,0.2);
    }
    .btn {
      width: 100%;
      padding: 14px;
      background: linear-gradient(135deg, var(--amber), var(--walnut));
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 1rem;
      font-weight: 800;
      cursor: pointer;
      text-transform: uppercase;
      letter-spacing: 1px;
      transition: all 0.2s;
      margin-top: 10px;
    }
    .btn:hover {
      box-shadow: 0 0 15px rgba(201,151,58,0.4);
    }
    #error-msg {
      color: var(--danger);
      font-size: 0.85rem;
      margin-top: 15px;
      text-align: center;
      display: none;
    }
  </style>
</head>
<body>

  <div class="login-container">
    <div class="logo">VenueAI <span>Secured</span></div>
    
    <div class="form-group">
      <label>Admin Username</label>
      <input type="text" id="username" placeholder="demo: admin" />
    </div>
    
    <div class="form-group">
      <label>Passphrase</label>
      <input type="password" id="password" placeholder="demo: admin123" />
    </div>
    
    <button class="btn" onclick="login()">Enter Command Center</button>
    
    <div id="error-msg"></div>
  </div>

  <script>
    async function login() {
      const u = document.getElementById('username').value;
      const p = document.getElementById('password').value;
      const btn = document.querySelector('.btn');
      const err = document.getElementById('error-msg');
      
      err.style.display = 'none';
      btn.innerText = 'Verifying...';
      
      try {
        const res = await fetch('/api/auth/login', {
          method: 'POST',
          headers: {'Content-Type': 'application/json'},
          body: JSON.stringify({ username: u, password: p })
        });
        const data = await res.json();
        
        if (data.success) {
          window.location.href = '/dashboard.html';
        } else {
          err.innerText = data.error || 'Invalid credentials';
          err.style.display = 'block';
          btn.innerText = 'Enter Command Center';
        }
      } catch (e) {
        err.innerText = 'Network error. Please try again.';
        err.style.display = 'block';
        btn.innerText = 'Enter Command Center';
      }
    }
  </script>
</body>
</html>
